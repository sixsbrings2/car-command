<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Car Command — Range Rover Acquisition Feed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14171c;
    --panel:#1b1f26;
    --panel-2:#21262f;
    --line:#2c333d;
    --ink:#e8ebef;
    --ink-dim:#9aa3af;
    --ink-faint:#646d78;
    --signal:#d98a2b;       /* instrument amber — the one bold accent */
    --signal-soft:#3a2c17;
    --good:#5fa776;
    --warn:#c98b3a;
    --bad:#b95c4f;
    --display:"Sora",system-ui,sans-serif;
    --mono:"Spline Sans Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);color:var(--ink);
    font-family:var(--display);line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  header{
    border-bottom:1px solid var(--line);
    padding:28px 32px 22px;
    display:flex;flex-wrap:wrap;align-items:flex-end;gap:20px;justify-content:space-between;
  }
  .brand{display:flex;flex-direction:column;gap:6px}
  .eyebrow{
    font-family:var(--mono);font-size:11px;letter-spacing:.28em;text-transform:uppercase;
    color:var(--signal);
  }
  h1{font-size:26px;font-weight:700;letter-spacing:-.01em}
  .sub{font-family:var(--mono);font-size:12.5px;color:var(--ink-dim)}
  .meta{font-family:var(--mono);font-size:12px;color:var(--ink-faint);text-align:right}
  .meta b{color:var(--ink-dim);font-weight:500}

  main{max-width:1100px;margin:0 auto;padding:28px 24px 80px}

  .feed{display:flex;flex-direction:column;gap:14px}

  .card{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    display:grid;grid-template-columns:128px 1fr;overflow:hidden;
    transition:border-color .18s ease, transform .18s ease;
  }
  .card:hover{border-color:#3a4350;transform:translateY(-1px)}

  /* ---- gauge: the signature element ---- */
  .gauge{
    background:var(--panel-2);border-right:1px solid var(--line);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:6px;padding:18px 10px;
  }
  .dial{position:relative;width:84px;height:84px}
  .dial svg{transform:rotate(-90deg)}
  .dial .track{stroke:var(--line);}
  .dial .fill{stroke:var(--signal);stroke-linecap:round;
    transition:stroke-dashoffset 1s cubic-bezier(.2,.8,.2,1);}
  .dial .num{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-size:24px;font-weight:600;letter-spacing:-.02em;
  }
  .gauge-label{font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--ink-faint)}

  /* ---- body ---- */
  .body{padding:16px 20px;display:flex;flex-direction:column;gap:10px;min-width:0}
  .row1{display:flex;flex-wrap:wrap;align-items:baseline;gap:8px 12px}
  .title{font-size:17px;font-weight:600;letter-spacing:-.01em}
  .title .yr{color:var(--ink-dim);font-weight:400}
  .trim{font-family:var(--mono);font-size:12.5px;color:var(--signal)}

  .verdict{font-size:14px;color:var(--ink-dim);max-width:62ch}

  .specs{display:flex;flex-wrap:wrap;gap:0 22px;font-family:var(--mono);font-size:12.5px}
  .spec{display:flex;gap:7px;align-items:baseline;padding:2px 0}
  .spec .k{color:var(--ink-faint);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase}
  .spec .v{color:var(--ink)}
  .price{color:var(--ink);font-weight:600}

  .footer-row{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-top:2px}
  .flags{display:flex;flex-wrap:wrap;gap:6px}
  .flag{
    font-family:var(--mono);font-size:11px;color:var(--warn);
    border:1px solid var(--line);background:#1f1a12;
    padding:2px 9px;border-radius:999px;
  }
  .clean{font-family:var(--mono);font-size:11px;color:var(--good)}
  .view{
    margin-left:auto;font-family:var(--mono);font-size:12px;font-weight:500;
    color:var(--bg);background:var(--signal);text-decoration:none;
    padding:7px 16px;border-radius:8px;transition:filter .15s ease;
  }
  .view:hover{filter:brightness(1.08)}
  .cpo{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--good);border:1px solid #2b3a30;border-radius:6px;padding:2px 7px}

  .empty,.loading{
    text-align:center;padding:80px 20px;color:var(--ink-dim);
    font-family:var(--mono);font-size:14px;
  }
  .empty b{color:var(--ink);display:block;margin-bottom:8px;font-size:16px;font-weight:600}

  footer{border-top:1px solid var(--line);padding:22px 32px;
    font-family:var(--mono);font-size:11.5px;color:var(--ink-faint)}

  @media (max-width:640px){
    header{padding:22px 18px 18px}
    .card{grid-template-columns:1fr}
    .gauge{flex-direction:row;border-right:none;border-bottom:1px solid var(--line);
      justify-content:flex-start;gap:14px;padding:12px 18px}
    .view{margin-left:0}
  }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <span class="eyebrow">Car Command · AI-scored feed</span>
      <h1>Range Rover Acquisition</h1>
      <span class="sub">Lake Norman · 50&nbsp;mi · used only · scored by Claude</span>
    </div>
    <div class="meta" id="meta">loading run data…</div>
  </header>

  <main>
    <div id="feed" class="feed">
      <div class="loading">Reading scored feed…</div>
    </div>
  </main>

  <footer>
    Auto.dev listings → Claude scoring → ranked feed. Refreshed weekdays 8AM EST via GitHub Actions.
  </footer>

<script>
const fmt = n => n == null ? "—" : n.toLocaleString("en-US");
const money = n => n == null ? "—" : "$" + Number(n).toLocaleString("en-US");

function scoreColor(s){
  if (s >= 85) return "var(--good)";
  if (s >= 70) return "var(--signal)";
  if (s >= 55) return "var(--warn)";
  return "var(--bad)";
}

function gauge(score){
  const R = 36, C = 2 * Math.PI * R;
  const pct = Math.max(0, Math.min(100, score)) / 100;
  const offset = C * (1 - pct);
  const col = scoreColor(score);
  return `
    <div class="dial">
      <svg width="84" height="84" viewBox="0 0 84 84">
        <circle class="track" cx="42" cy="42" r="${R}" fill="none" stroke-width="7"/>
        <circle class="fill" cx="42" cy="42" r="${R}" fill="none" stroke-width="7"
          stroke="${col}" stroke-dasharray="${C}" stroke-dashoffset="${offset}"/>
      </svg>
      <div class="num" style="color:${col}">${score}</div>
    </div>
    <span class="gauge-label">Fit score</span>`;
}

function card(x){
  const flags = (x.flags && x.flags.length)
    ? `<div class="flags">${x.flags.map(f=>`<span class="flag">${f}</span>`).join("")}</div>`
    : `<span class="clean">No flags</span>`;
  const cpo = x.cpo ? `<span class="cpo">CPO</span>` : "";
  const href = x.url && x.url.startsWith("http") ? x.url : "#";
  return `
  <article class="card">
    <div class="gauge">${gauge(x.score ?? 0)}</div>
    <div class="body">
      <div class="row1">
        <span class="title"><span class="yr">${x.year ?? ""}</span> ${x.model ?? ""}</span>
        <span class="trim">${x.trim ?? ""}</span>
        ${cpo}
      </div>
      <p class="verdict">${x.verdict ?? ""}</p>
      <div class="specs">
        <span class="spec"><span class="k">Color</span><span class="v">${x.exterior_color ?? "—"}</span></span>
        <span class="spec"><span class="k">Miles</span><span class="v">${fmt(x.mileage)}</span></span>
        <span class="spec"><span class="k">Price</span><span class="v price">${money(x.price)}</span></span>
        <span class="spec"><span class="k">Title</span><span class="v">${x.title_status ?? "—"}</span></span>
        <span class="spec"><span class="k">Dealer</span><span class="v">${x.dealer_name ?? "—"}${x.city ? ", "+x.city : ""}</span></span>
      </div>
      <div class="footer-row">
        ${flags}
        <a class="view" href="${href}" target="_blank" rel="noopener">View listing</a>
      </div>
    </div>
  </article>`;
}

async function load(){
  const feed = document.getElementById("feed");
  const meta = document.getElementById("meta");
  try{
    const res = await fetch("../data/listings.json?ts=" + Date.now());
    if(!res.ok) throw new Error(res.status);
    const data = await res.json();
    const list = data.listings || [];
    const when = data.generated_at ? new Date(data.generated_at) : null;
    meta.innerHTML = `<b>${list.length}</b> scored listings`
      + (when ? ` · run ${when.toLocaleDateString("en-US",{month:"short",day:"numeric"})} `
        + when.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}) : "");
    if(!list.length){
      feed.innerHTML = `<div class="empty"><b>No matches this run.</b>
        Nothing cleared the score threshold. Loosen criteria in config.yaml or widen the radius.</div>`;
      return;
    }
    feed.innerHTML = list.map(card).join("");
  }catch(e){
    feed.innerHTML = `<div class="empty"><b>Couldn't load the feed.</b>
      data/listings.json isn't reachable yet. The first agent run will create it.</div>`;
    meta.textContent = "no run data";
  }
}
load();
</script>
</body>
</html>
